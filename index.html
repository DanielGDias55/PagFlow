<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Cobrança</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --whatsapp: #25d366; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        /* Esconde o admin por padrão se for link de cliente */
        .view-admin { display: block; }
        .view-cliente { display: none; }
        
        body.modo-cliente .view-admin { display: none !important; }
        body.modo-cliente .view-cliente { display: flex !important; }

        .container { max-width: 800px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .pix-box { background: #eff6ff; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { padding: 10px; border-radius: 8px; color: white; text-align: center; font-size: 12px; font-weight: bold; }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f1f5f9; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-pago { background: var(--success); color: white; width: 100%; padding: 15px; font-size: 16px; }
        .btn-add { background: var(--primary); color: white; margin-bottom: 15px; }
        
        /* Estilo do Portal do Cliente */
        .portal-cliente { flex-direction: column; align-items: center; text-align: center; gap: 20px; padding: 20px; }
        .preview-img { width: 100%; max-height: 300px; object-fit: contain; border: 2px dashed #ccc; margin-top: 15px; display: none; }
        input[type="file"] { display: none; }
        .label-file { background: #64748b; color: white; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container view-admin">
    <h2>📊 Minha Gestão</h2>
    
    <div class="stats">
        <div class="stat-card" style="background:var(--primary)">Total<br><span id="totalMes">0</span></div>
        <div class="stat-card" style="background:var(--success)">Pago<br><span id="totalPago">0</span></div>
        <div class="stat-card" style="background:var(--danger)">Pendente<br><span id="totalPendente">0</span></div>
    </div>

    <button class="btn btn-add" onclick="adicionarPessoa()">+ Adicionar Cobrança</button>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>
</div>

<div class="container view-cliente portal-cliente">
    <h2 id="clienteMsg">Olá!</h2>
    <div class="pix-box">
        <p>Valor a pagar: <strong style="font-size: 20px; color: var(--primary);">R$ <span id="clienteValor">0,00</span></strong></p>
        <div id="qrcode" style="display: flex; justify-content: center; margin: 10px 0;"></div>
        <p><small>Pague pelo QR Code acima ou Chave PIX</small></p>
    </div>

    <div style="width: 100%;">
        <p><strong>Envie o comprovante abaixo:</strong></p>
        <label for="inputComprovante" class="label-file">📸 Abrir Galeria ou Câmera</label>
        <input type="file" id="inputComprovante" accept="image/*" onchange="previewImagem(this)">
        
        <img id="preview" class="preview-img">
        
        <br><br>
        <button id="btnConfirmar" class="btn btn-pago" onclick="salvarComprovante()">CONFIRMAR PAGAMENTO</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cobranca_v4')) || {};
    let baseUsuarios = JSON.parse(localStorage.getItem('base_v4')) || [];
    let mesAtual = `${String(new Date().getMonth() + 1).padStart(2, '0')}/${new Date().getFullYear()}`;
    let idSessao = null;

    function inicializar() {
        const params = new URLSearchParams(window.location.search);
        idSessao = params.get('p');

        if (idSessao) {
            // Entra no modo CLIENTE
            document.body.classList.add('modo-cliente');
            carregarDadosCliente(idSessao);
        } else {
            // Entra no modo ADMIN
            renderizarAdmin();
        }
    }

    // --- LÓGICA DO CLIENTE ---
    function carregarDadosCliente(id) {
        const p = (db[mesAtual] || []).find(x => x.id == id);
        if (p) {
            document.getElementById('clienteMsg').innerText = "Olá, " + p.nome;
            document.getElementById('clienteValor').innerText = p.valor.toFixed(2);
            new QRCode(document.getElementById("qrcode"), { text: "SUA_CHAVE_PIX_AQUI", width: 120, height: 120 });
        } else {
            alert("Cobrança não encontrada ou já expirou.");
        }
    }

    function previewImagem(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function salvarComprovante() {
        const img = document.getElementById('preview').src;
        if (!img || img.startsWith('data') === false) return alert("Por favor, selecione a foto do comprovante.");

        const lista = db[mesAtual] || [];
        const p = lista.find(x => x.id == idSessao);
        if (p) {
            p.pago = true;
            p.comprovante = img;
            localStorage.setItem('cobranca_v4', JSON.stringify(db));
            alert("✅ Comprovante enviado com sucesso!");
            window.location.search = ""; // Recarrega limpo
        }
    }

    // --- LÓGICA DO ADMIN ---
    function renderizarAdmin() {
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = "";
        const lista = db[mesAtual] || [];
        
        let t = 0, pg = 0, pd = 0;

        lista.forEach(p => {
            t += p.valor;
            if(p.pago) pg += p.valor; else pd += p.valor;

            corpo.innerHTML += `
                <tr>
                    <td>${p.nome}</td>
                    <td>R$ ${p.valor.toFixed(2)}</td>
                    <td>${p.pago ? '✅' : '⏳'}</td>
                    <td>
                        <button class="btn" onclick="enviarZap(${p.id},'${p.nome}','${p.tel}',${p.valor})" style="background:var(--whatsapp); color:white">📲</button>
                        ${p.comprovante ? `<button class="btn" onclick="verFoto('${p.comprovante}')">👁️</button>` : ''}
                    </td>
                </tr>
            `;
        });
        document.getElementById('totalMes').innerText = "R$ "+t.toFixed(2);
        document.getElementById('totalPago').innerText = "R$ "+pg.toFixed(2);
        document.getElementById('totalPendente').innerText = "R$ "+pd.toFixed(2);
    }

    function enviarZap(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        const msg = encodeURIComponent(`Olá ${nome}! Segue link para pagamento e envio do comprovante:\n\n${link}`);
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    function adicionarPessoa() {
        const nome = prompt("Nome:");
        const tel = prompt("WhatsApp (Ex: 5511999999999):");
        const valor = parseFloat(prompt("Valor:"));
        if(!nome || !tel || isNaN(valor)) return;

        const nova = { id: Date.now(), nome, tel, valor, pago: false, comprovante: null };
        if(!db[mesAtual]) db[mesAtual] = [];
        db[mesAtual].push(nova);
        localStorage.setItem('cobranca_v4', JSON.stringify(db));
        renderizarAdmin();
    }

    function verFoto(img) {
        const w = window.open("");
        w.document.write(`<img src="${img}" style="width:100%">`);
    }

    inicializar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobrança Pro - v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --whatsapp: #25d366; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: flex; flex-direction: column; align-items: center; }

        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .pix-config { background: #eff6ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #dbeafe; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { padding: 10px; border-radius: 8px; color: white; text-align: center; font-weight: bold; font-size: 13px; }
        
        .table-res { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f1f5f9; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 8px; border-bottom: 1px solid #eee; }

        input, select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%; font-size: 14px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; justify-content: center; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin: 15px 0; }
        .btn-zap { background: var(--whatsapp); color: white; text-decoration: none; }
        
        .client-box { width: 100%; max-width: 400px; text-align: center; }
        .preview-img { width: 100%; max-height: 250px; object-fit: contain; margin-top: 15px; border: 2px dashed #ccc; display: none; }
        .file-label { background: #475569; color: white; padding: 15px; border-radius: 8px; display: block; margin: 15px 0; cursor: pointer; }
    </style>
</head>
<body class="modo-admin">

<div class="container">
    
    <div class="admin-only">
        <h2>📊 Gestão de Cobrança</h2>
        
        <div class="pix-config">
            <strong>Sua Chave PIX:</strong>
            <input type="text" id="chavePix" onchange="salvarConfig()">
            <div id="qrcodeAdmin" style="margin-top:10px"></div>
        </div>

        <div style="margin-bottom: 15px;">
            <strong>Mês de Referência:</strong>
            <select id="filtroMes" onchange="trocarMes()"></select>
            <small style="color: #64748b; display: block; margin-top: 4px;">* Novos meses geram após dia 20 com base nos usuários cadastrados.</small>
        </div>

        <div class="stats">
            <div class="stat-card" style="background:var(--primary)">Total<br>R$ <span id="tGeral">0</span></div>
            <div class="stat-card" style="background:var(--success)">Pago<br>R$ <span id="tPago">0</span></div>
            <div class="stat-card" style="background:var(--danger)">Pendente<br>R$ <span id="tPend">0</span></div>
        </div>

        <button class="btn btn-add" onclick="adicionarPessoa()">+ Adicionar Pessoa à Base</button>

        <div class="table-res">
            <table>
                <thead>
                    <tr>
                        <th>Nome / Tel</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <div class="client-only client-box">
        <h2 id="cNome">Olá!</h2>
        <div style="background:#f0fdf4; padding:20px; border-radius:10px; width:100%">
            <p>Valor a pagar:</p>
            <h1 style="color:var(--primary); margin:0">R$ <span id="cValor">0,00</span></h1>
            <div id="qrcodeCliente" style="display:flex; justify-content:center; margin:15px 0"></div>
        </div>

        <p style="margin-top:20px"><strong>Selecione o comprovante:</strong></p>
        <label for="fotoInput" class="file-label">📸 Galeria ou Câmera</label>
        <input type="file" id="fotoInput" accept="image/*" onchange="lerFoto(this)" style="display:none">
        
        <img id="imgPreview" class="preview-img">
        
        <button id="btnConfirmar" class="btn" style="background:var(--success); color:white; width:100%; padding:15px; margin-top:20px; font-size:16px" onclick="confirmarPagamento()">
            CONFIRMAR E MARCAR COMO PAGO
        </button>
    </div>

</div>

<script>
    // Recuperação de dados
    let db = JSON.parse(localStorage.getItem('cobranca_v6')) || {};
    let baseUsuarios = JSON.parse(localStorage.getItem('base_v6')) || [];
    let config = JSON.parse(localStorage.getItem('config_v6')) || { chave: "seu-email@pix.com" };
    
    function getMesAno() {
        const d = new Date();
        return `${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    let mesVisivel = getMesAno();
    let idUsuarioAtivo = null;

    function init() {
        const params = new URLSearchParams(window.location.search);
        idUsuarioAtivo = params.get('p');

        verificarViradaDeMes();

        if (idUsuarioAtivo) {
            document.body.className = "modo-cliente";
            exibirPainelCliente(idUsuarioAtivo);
        } else {
            document.body.className = "modo-admin";
            document.getElementById('chavePix').value = config.chave;
            renderizarFiltro();
            atualizarTudo();
        }
    }

    function verificarViradaDeMes() {
        const hoje = new Date();
        const mesAtual = getMesAno();
        
        // Se após dia 20 e o mês atual não existe no DB, cria baseado na base de usuários
        if (hoje.getDate() >= 20 && !db[mesAtual]) {
            db[mesAtual] = baseUsuarios.map(u => ({ ...u, pago: false, comprovante: null }));
            salvar();
        }
        if (!db[mesAtual]) db[mesAtual] = [];
    }

    function renderizarFiltro() {
        const sel = document.getElementById('filtroMes');
        const meses = Object.keys(db).length ? Object.keys(db) : [getMesAno()];
        sel.innerHTML = meses.sort().reverse().map(m => `<option value="${m}" ${m === mesVisivel ? 'selected' : ''}>${m}</option>`).join('');
    }

    function trocarMes() {
        mesVisivel = document.getElementById('filtroMes').value;
        atualizarTudo();
    }

    // --- ADMIN ---
    function atualizarTudo() {
        const lista = db[mesVisivel] || [];
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        
        let total = 0, pago = 0, pend = 0;

        lista.forEach(p => {
            total += p.valor;
            if(p.pago) pago += p.valor; else pend += p.valor;

            corpo.innerHTML += `
                <tr>
                    <td>
                        <input type="text" value="${p.nome}" onchange="editar(${p.id},'nome',this.value)" style="margin-bottom:2px"><br>
                        <input type="text" value="${p.tel}" onchange="editar(${p.id},'tel',this.value)" style="font-size:11px; color:#666">
                    </td>
                    <td><input type="number" value="${p.valor}" onchange="editar(${p.id},'valor',this.value)"></td>
                    <td>
                        <button onclick="alternar(${p.id})" style="border:none; background:none; cursor:pointer; font-size:20px">
                            ${p.pago ? '✅' : '⏳'}
                        </button>
                    </td>
                    <td>
                        <div style="display:flex; gap:5px">
                            <button class="btn btn-zap" onclick="cobrar(${p.id},'${p.nome}','${p.tel}',${p.valor})">📲</button>
                            ${p.comprovante ? `<button class="btn" onclick="verFoto('${p.comprovante}')">👁️</button>` : ''}
                            <button class="btn" onclick="excluir(${p.id})" style="background:#fee2e2">🗑️</button>
                        </div>
                    </td>
                </tr>
            `;
        });

        document.getElementById('tGeral').innerText = total.toFixed(2);
        document.getElementById('tPago').innerText = pago.toFixed(2);
        document.getElementById('tPend').innerText = pend.toFixed(2);
        
        const qrDiv = document.getElementById("qrcodeAdmin");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: config.chave, width: 80, height: 80 });
    }

    function adicionarPessoa() {
        const id = Date.now();
        const nova = { id, nome: "Novo Cliente", tel: "55", valor: 0, pago: false, comprovante: null };
        
        baseUsuarios.push(nova);
        if(!db[mesVisivel]) db[mesVisivel] = [];
        db[mesVisivel].push({...nova});
        
        salvar();
        atualizarTudo();
    }

    function cobrar(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        const msg = encodeURIComponent(`Olá ${nome}!\nLembrete de pagamento (${mesVisivel}):\n\nValor: R$ ${valor.toFixed(2)}\nPIX: ${config.chave}\n\nEnvie o comprovante pelo link:\n${link}`);
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    function editar(id, campo, valor) {
        // Atualiza no mês
        const p = db[mesVisivel].find(x => x.id === id);
        if(p) p[campo] = campo === 'valor' ? parseFloat(valor) : valor;
        // Atualiza na base para meses futuros
        const pb = baseUsuarios.find(x => x.id === id);
        if(pb) pb[campo] = campo === 'valor' ? parseFloat(valor) : valor;
        salvar();
        atualizarTudo();
    }

    function alternar(id) {
        const p = db[mesVisivel].find(x => x.id === id);
        if(p) { p.pago = !p.pago; if(!p.pago) p.comprovante = null; }
        salvar();
        atualizarTudo();
    }

    function excluir(id) {
        if(confirm("Remover da base e deste mês?")) {
            db[mesVisivel] = db[mesVisivel].filter(x => x.id !== id);
            baseUsuarios = baseUsuarios.filter(x => x.id !== id);
            salvar();
            atualizarTudo();
        }
    }

    // --- CLIENTE ---
    function exibirPainelCliente(id) {
        // Busca o usuário em qualquer mês que exista no DB para garantir que o valor apareça
        let usuarioEncontrado = null;
        let mesDaCobranca = "";

        for (let mes in db) {
            let u = db[mes].find(x => x.id == id);
            if(u) { usuarioEncontrado = u; mesDaCobranca = mes; break; }
        }

        if (usuarioEncontrado) {
            document.getElementById('cNome').innerText = "Olá, " + usuarioEncontrado.nome;
            document.getElementById('cValor').innerText = usuarioEncontrado.valor.toFixed(2);
            new QRCode(document.getElementById("qrcodeCliente"), { text: config.chave, width: 150, height: 150 });
            
            // Guarda o mês correto para salvar o comprovante
            mesVisivel = mesDaCobranca; 
        } else {
            alert("Erro: Dados não encontrados.");
        }
    }

    function lerFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('imgPreview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function confirmarPagamento() {
        const img = document.getElementById('imgPreview').src;
        if (!img || img.startsWith('data:image') === false) return alert("Selecione a foto do comprovante.");

        const p = db[mesVisivel].find(x => x.id == idUsuarioAtivo);
        if (p) {
            p.pago = true;
            p.comprovante = img;
            salvar();
            alert("Sucesso! O administrador recebeu seu comprovante.");
            window.location.search = ""; 
        }
    }

    function salvarConfig() {
        config.chave = document.getElementById('chavePix').value;
        localStorage.setItem('config_v6', JSON.stringify(config));
        atualizarTudo();
    }

    function salvar() { 
        localStorage.setItem('cobranca_v6', JSON.stringify(db)); 
        localStorage.setItem('base_v6', JSON.stringify(baseUsuarios));
    }

    function verFoto(img) { 
        const w = window.open(""); 
        w.document.write(`<body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center"><img src="${img}" style="max-width:100%; max-height:100%"></body>`); 
    }

    init();
</script>
</body>
</html>

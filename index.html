<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Manager SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { slate: { 850: '#1e293b', 950: '#020617' } } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        html.dark { background-color: #020617 !important; }
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; min-height: 100vh; }
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only, body.modo-cliente .client-only { display: block; }
        .editable-input { background: transparent; border: 1px solid transparent; padding: 2px 5px; border-radius: 4px; }
        .dark .editable-input:focus { background: #0f172a !important; color: white !important; }
        #modalImport { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .filter-btn.active { background-color: white; color: #1e293b; font-weight: 700; }
        .dark .filter-btn.active { background-color: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 p-4 md:p-8 pb-32">

<div id="bulkActions" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-blue-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-6 z-50 transition-all scale-0 opacity-0 translate-y-20">
    <span class="text-sm font-bold border-r border-white/20 pr-6"><span id="selectedCount">0</span> selecionados</span>
    <button onclick="bulkDelete()" class="flex items-center gap-2 text-sm font-bold hover:text-rose-300"><i data-lucide="trash-2" class="w-4 h-4"></i> Excluir</button>
    <button onclick="bulkSetGroup()" class="flex items-center gap-2 text-sm font-bold hover:text-blue-200"><i data-lucide="folder-plus" class="w-4 h-4"></i> Mover</button>
    <button onclick="clearSelection()"><i data-lucide="x" class="w-5 h-5 opacity-50"></i></button>
</div>

<div id="modalImport" onclick="fecharModal()">
    <div class="bg-white dark:bg-slate-900 w-full max-w-lg p-8 rounded-3xl mx-4" onclick="event.stopPropagation()">
        <h3 class="text-xl font-black mb-4 uppercase">Importar CSV</h3>
        <input type="file" id="arquivoCSV" accept=".csv" class="hidden" onchange="document.getElementById('nArq').innerText=this.files[0].name">
        <label for="arquivoCSV" class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 block text-center cursor-pointer">
            <p id="nArq" class="text-sm font-bold opacity-60">Selecione o arquivo .csv</p>
        </label>
        <div class="flex gap-3 mt-6"><button onclick="fecharModal()" class="flex-1 py-3">Voltar</button><button onclick="processarCSV()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold">Processar</button></div>
    </div>
</div>

<div class="max-w-6xl mx-auto space-y-6">
    <div class="admin-only space-y-6">
        <header class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div><h1 class="text-2xl font-black tracking-tight uppercase italic">Pool Pro</h1><select id="filtroMes" onchange="mudarMes(this.value)" class="bg-slate-100 dark:bg-slate-800 dark:text-white rounded-lg px-2 py-1 text-xs font-black italic"></select></div>
                <div class="flex flex-col border-l dark:border-slate-800 pl-4"><span class="text-[10px] font-black opacity-40 uppercase">Filtrar Grupo</span><select id="filtroGrupo" onchange="renderizarTabela()" class="bg-slate-100 dark:bg-slate-800 text-xs font-bold rounded-lg px-2 py-1"></select></div>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl flex gap-1">
                    <button onclick="setFiltroStatus('todos')" id="btn-todos" class="filter-btn active px-3 py-1 text-[10px] font-black uppercase rounded-lg">Todos</button>
                    <button onclick="setFiltroStatus('pendente')" id="btn-pendente" class="filter-btn px-3 py-1 text-[10px] font-black uppercase rounded-lg opacity-40">Pendentes</button>
                    <button onclick="setFiltroStatus('nao_enviado')" id="btn-nao_enviado" class="filter-btn px-3 py-1 text-[10px] font-black uppercase rounded-lg opacity-40 text-rose-500">Cobrar</button>
                </div>
                <button onclick="abrirModal()" class="bg-slate-100 dark:bg-slate-800 p-2.5 rounded-xl"><i data-lucide="file-spreadsheet" class="w-5 h-5 text-emerald-500"></i></button>
                <button onclick="adicionarPessoa()" class="bg-blue-600 text-white p-2.5 rounded-xl"><i data-lucide="plus" class="w-5 h-5"></i></button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800"><i data-lucide="moon" class="dark:hidden"></i><i data-lucide="sun" class="hidden dark:block text-yellow-400"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800"><p class="text-[10px] font-black opacity-40 uppercase italic">Previsão</p><div class="text-2xl font-black italic">R$ <span id="tGeral">0,00</span></div></div>
            <div class="bg-emerald-500 p-5 rounded-2xl text-white shadow-lg"><p class="text-[10px] font-black opacity-70 uppercase italic">Confirmado</p><div class="text-2xl font-black italic">R$ <span id="tPago">0,00</span></div></div>
            <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl border-l-4 border-l-rose-500 border border-slate-200 dark:border-slate-800"><p class="text-[10px] font-black opacity-40 uppercase italic">Pendente</p><div class="text-2xl font-black text-rose-500 italic">R$ <span id="tPend">0,00</span></div></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-slate-900 dark:bg-blue-950 p-4 rounded-xl text-white flex items-center gap-4"><i data-lucide="key" class="text-blue-400"></i><div class="flex-1"><p class="text-[10px] font-black opacity-50 uppercase">PIX</p><input type="text" id="chavePix" onchange="salvarConfig('chavePix', this.value)" class="bg-transparent w-full focus:ring-0 font-mono text-sm" placeholder="Sua chave..."></div></div>
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-xl flex items-center gap-4"><i data-lucide="dollar-sign" class="text-blue-600"></i><div class="flex-1"><p class="text-[10px] font-black text-slate-400 uppercase">Valor Padrão</p><input type="number" id="valorPadrao" onchange="salvarConfig('valorPadrao', parseFloat(this.value))" class="bg-transparent w-full focus:ring-0 font-bold dark:text-white" placeholder="0.00"></div></div>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
            <div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead class="bg-slate-50 dark:bg-slate-850 border-b border-slate-200 dark:border-slate-800 font-black uppercase tracking-widest text-slate-400"><tr><th class="px-6 py-4 w-10"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th class="px-2 py-4 cursor-pointer" onclick="toggleOrdemAlfabetica()">Participante</th><th class="px-6 py-4 text-center">Valor</th><th class="px-6 py-4 text-center">Status</th><th class="px-6 py-4 text-right">Ações</th></tr></thead><tbody id="corpoTabela" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody></table></div>
        </div>
    </div>

    <div class="client-only max-w-md mx-auto py-10 px-4">
        <div class="bg-white dark:bg-slate-900 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 overflow-hidden p-8 text-center space-y-6">
            <h2 class="text-4xl font-black italic dark:text-white" id="cNome">Olá!</h2>
            <div class="bg-blue-600 p-8 rounded-[2.5rem] text-white italic"><p class="text-[10px] font-black uppercase opacity-70">Valor</p><h3 class="text-5xl font-black">R$ <span id="cValor">0,00</span></h3></div>
            <p id="cChavePixExibicao" class="font-mono font-bold dark:text-white p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border dark:border-slate-700">---</p>
            <input type="file" id="fotoInput" accept="image/*" class="hidden" onchange="lerFoto(this)">
            <label for="fotoInput" class="flex flex-col items-center justify-center gap-4 w-full bg-slate-50 dark:bg-slate-850 border-2 border-dashed border-slate-200 dark:border-slate-700 p-10 rounded-[2.5rem] cursor-pointer hover:border-blue-500"><i data-lucide="camera" class="w-8 h-8 text-blue-500"></i><span class="text-xs font-bold uppercase">Anexar Comprovante</span></label>
            <img id="imgPreview" class="w-full rounded-[2rem] hidden shadow-xl">
        </div>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyBKuldmBQEuNyEWVZ-0sPW0ItGn8QqPxd8",authDomain:"pool-e439a.firebaseapp.com",databaseURL:"https://pool-e439a-default-rtdb.firebaseio.com",projectId:"pool-e439a",storageBucket:"pool-e439a.firebasestorage.app",messagingSenderId:"94463318724",appId:"1:94463318724:web:05208de1c8a9cbfd014791"};
firebase.initializeApp(firebaseConfig); const db=firebase.database();
let mesAtual=`${String(new Date().getMonth()+1).padStart(2,'0')}-${new Date().getFullYear()}`,dadosLocais=[],filtroStatus='todos',ordemCrescente=true,configGeral={chavePix:"",valorPadrao:0},selecionados=new Set(),idCliente=new URLSearchParams(window.location.search).get('p');

function iniciar(){
    if(localStorage.theme==='dark'||(!('theme' in localStorage)&&window.matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');
    db.ref('configuracoes').on('value',s=>{ configGeral=s.val()||{chavePix:"",valorPadrao:0}; document.getElementById('chavePix').value=configGeral.chavePix; document.getElementById('valorPadrao').value=configGeral.valorPadrao; if(idCliente)document.getElementById('cChavePixExibicao').innerText=configGeral.chavePix;});
    gerarOpcoesMes(); verificarReset(); if(idCliente){ carregarPortalCliente(); document.body.className="modo-cliente"; } else { carregarDadosAdmin(); document.body.className="modo-admin"; }
    lucide.createIcons();
}

async function verificarReset(){
    const hoje=new Date(); if(hoje.getDate()>=20){
        const prox=new Date(hoje.getFullYear(),hoje.getMonth()+1,1); const keyProx=`${String(prox.getMonth()+1).padStart(2,'0')}-${prox.getFullYear()}`;
        const s=await db.ref(`cobrancas/${keyProx}`).once('value');
        if(!s.exists()){ const atual=await db.ref(`cobrancas/${mesAtual}`).once('value'); if(atual.exists()){ const lista=atual.val(); const nova={}; Object.keys(lista).forEach(id=>{ nova[id]={...lista[id],pago:false,msgEnviada:false,comprovante:null};}); await db.ref(`cobrancas/${keyProx}`).set(nova);}}}
}

function carregarDadosAdmin(){ db.ref(`cobrancas/${mesAtual}`).on('value',s=>{ const d=s.val()||{}; dadosLocais=Object.keys(d).map(id=>({id,...d[id]})); atualizarFiltroGrupos(); renderizarTabela();});}

function atualizarFiltroGrupos(){ const g=[...new Set(dadosLocais.map(p=>p.grupo).filter(x=>x))]; const s=document.getElementById('filtroGrupo'); const v=s.value; s.innerHTML='<option value="todos">Todos os Grupos</option>'; g.forEach(x=>{s.innerHTML+=`<option value="${x}">${x}</option>`;}); s.value=v;}

function renderizarTabela(){
    const corpo=document.getElementById('corpoTabela'), gF=document.getElementById('filtroGrupo').value; let f=[...dadosLocais];
    if(filtroStatus==='pago') f=f.filter(p=>p.pago); if(filtroStatus==='pendente') f=f.filter(p=>!p.pago); if(filtroStatus==='nao_enviado') f=f.filter(p=>!p.msgEnviada); if(gF!=='todos') f=f.filter(p=>p.grupo===gF);
    f.sort((a,b)=>ordemCrescente?a.nome.localeCompare(b.nome):b.nome.localeCompare(a.nome));
    corpo.innerHTML=""; let t=0,pg=0,pd=0;
    f.forEach(p=>{ const val=parseFloat(p.valor)||0; t+=val; if(p.pago)pg+=val; else pd+=val;
        corpo.innerHTML+=`<tr class="hover:bg-slate-50 dark:hover:bg-slate-850/50 transition ${selecionados.has(p.id)?'bg-blue-50 dark:bg-blue-900/20':''}">
            <td class="px-6 py-4"><input type="checkbox" ${selecionados.has(p.id)?'checked':''} onclick="toggleSelect('${p.id}')"></td>
            <td class="px-2 py-4"><input type="text" value="${p.nome}" onblur="editar('${p.id}','nome',this.value)" class="editable-input font-bold dark:text-white w-full block"><input type="text" value="${p.grupo||''}" placeholder="Sem grupo..." onblur="editar('${p.id}','grupo',this.value)" class="editable-input text-[10px] text-blue-500 font-black uppercase w-full"></td>
            <td class="px-6 py-4 text-center">R$ <input type="number" step="0.01" value="${val.toFixed(2)}" onblur="editar('${p.id}','valor',this.value)" class="editable-input w-20 text-center dark:text-white font-bold italic"></td>
            <td class="px-6 py-4 text-center"><button onclick="togglePago('${p.id}',${p.pago})" class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${p.pago?'bg-emerald-100 text-emerald-600':'bg-amber-100 text-amber-600'}">${p.pago?'Pago':'Pendente'}</button></td>
            <td class="px-6 py-4 text-right space-x-1"><button onclick="enviarZap('${p.id}','${p.nome}','${p.tel}',${val})" class="p-2 ${p.msgEnviada?'text-blue-500':'opacity-30'}"><i data-lucide="${p.msgEnviada?'check-check':'send'}" class="w-4 h-4"></i></button>${p.comprovante?`<button onclick="verFoto('${p.comprovante}')" class="p-2 text-blue-500"><i data-lucide="eye" class="w-4 h-4"></i></button>`:''}<button onclick="excluir('${p.id}')" class="p-2 text-slate-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`;
    });
    document.getElementById('tGeral').innerText=t.toLocaleString('pt-br',{minimumFractionDigits:2}); document.getElementById('tPago').innerText=pg.toLocaleString('pt-br',{minimumFractionDigits:2}); document.getElementById('tPend').innerText=pd.toLocaleString('pt-br',{minimumFractionDigits:2}); lucide.createIcons();
}

function toggleSelect(id){ if(selecionados.has(id))selecionados.delete(id); else selecionados.add(id); renderizarBarraBulk(); renderizarTabela();}
function toggleSelectAll(el){ if(el.checked)dadosLocais.forEach(p=>selecionados.add(p.id)); else selecionados.clear(); renderizarBarraBulk(); renderizarTabela();}
function clearSelection(){ selecionados.clear(); document.getElementById('selectAll').checked=false; renderizarBarraBulk(); renderizarTabela();}
function renderizarBarraBulk(){ const b=document.getElementById('bulkActions'); document.getElementById('selectedCount').innerText=selecionados.size; if(selecionados.size>0) b.classList.remove('scale-0','opacity-0','translate-y-20'); else b.classList.add('scale-0','opacity-0','translate-y-20');}
function bulkDelete(){ if(confirm(`Excluir ${selecionados.size}?`)){ const u={}; selecionados.forEach(id=>{u[id]=null;}); db.ref(`cobrancas/${mesAtual}`).update(u).then(()=>clearSelection());}}
function bulkSetGroup(){ const n=prompt("Nome do grupo:"); if(n!==null){ const u={}; selecionados.forEach(id=>{u[`${id}/grupo`]=n;}); db.ref(`cobrancas/${mesAtual}`).update(u).then(()=>clearSelection());}}
function setFiltroStatus(s){ filtroStatus=s; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.add('opacity-40')); document.getElementById(`btn-${s}`).classList.remove('opacity-40'); document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); document.getElementById(`btn-${s}`).classList.add('active'); renderizarTabela();}
function enviarZap(id,n,t,v){ db.ref(`cobrancas/${mesAtual}/${id}`).update({msgEnviada:true}); const link=window.location.href.split('?')[0]+"?p="+id; const msg=encodeURIComponent(`Ola, ${n}! O valor e R$ ${v.toFixed(2).replace('.',',')}.\nPIX: ${configGeral.chavePix}\nLink: ${link}`); window.open(`https://wa.me/${t}?text=${msg}`);}
function toggleDarkMode(){ const h=document.documentElement; if(h.classList.contains('dark')){ h.classList.remove('dark'); localStorage.theme='light';} else { h.classList.add('dark'); localStorage.theme='dark';}}
function editar(id,c,v){ db.ref(`cobrancas/${mesAtual}/${id}`).update({[c]:v});}
function togglePago(id,s){ db.ref(`cobrancas/${mesAtual}/${id}`).update({pago:!s});}
function excluir(id){ if(confirm("Apagar?"))db.ref(`cobrancas/${mesAtual}/${id}`).remove();}
function salvarConfig(c,v){ db.ref('configuracoes').update({[c]:v});}
function mudarMes(v){ clearSelection(); mesAtual=v; carregarDadosAdmin();}
function toggleOrdemAlfabetica(){ ordemCrescente=!ordemCrescente; renderizarTabela();}
function adicionarPessoa(){ const n=prompt("Nome:"); if(n)db.ref(`cobrancas/${mesAtual}/${Date.now()}`).set({nome:n,tel:"55",valor:configGeral.valorPadrao||0,pago:false,msgEnviada:false});}
function abrirModal(){ document.getElementById('modalImport').style.display='flex';}
function fecharModal(){ document.getElementById('modalImport').style.display='none';}
function processarCSV(){
    const f=document.getElementById('arquivoCSV').files[0]; if(!f) return; const r=new FileReader();
    r.onload=function(e){ const l=e.target.result.split('\n'), u={}; for(let i=1;i<l.length;i++){ let c=l[i].split(/[;,]/); if(c[0]){ const id=Date.now()+i; u[id]={nome:c[0].trim(),tel:c[1]?c[1].trim():"55",valor:configGeral.valorPadrao||0,pago:false,msgEnviada:false};}} db.ref(`cobrancas/${mesAtual}`).update(u).then(()=>fecharModal());}; r.readAsText(f,'UTF-8');
}
function gerarOpcoesMes(){ const s=document.getElementById('filtroMes'), a=new Date(); for(let i=-2;i<=4;i++){ const d=new Date(a.getFullYear(),a.getMonth()+i,1); const k=`${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; const o=document.createElement('option'); o.value=k; o.innerText=d.toLocaleDateString('pt-br',{month:'long',year:'numeric'}); if(k===mesAtual) o.selected=true; s.appendChild(o);}}
function carregarPortalCliente(){ db.ref(`cobrancas/${mesAtual}/${idCliente}`).on('value',s=>{ const p=s.val(); if(p){ document.getElementById('cNome').innerText="Olá, "+p.nome; document.getElementById('cValor').innerText=p.valor.toLocaleString('pt-br',{minimumFractionDigits:2});}});}
function lerFoto(i){ if(i.files&&i.files[0]){ const r=new FileReader(); r.onload=e=>{ document.getElementById('imgPreview').src=e.target.result; document.getElementById('imgPreview').classList.remove('hidden'); db.ref(`cobrancas/${mesAtual}/${idCliente}`).update({pago:true,comprovante:e.target.result}); alert("Enviado!"); }; r.readAsDataURL(i.files[0]); }}
function verFoto(img){ const v=window.open(""); v.document.write(`<body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center"><img src="${img}" style="max-height:100%; max-width:100%"></body>`);}
iniciar();
</script>
</body>
</html>

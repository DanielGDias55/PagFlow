<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobrança Pro - Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --whatsapp: #25d366; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        
        /* Controle de Visão */
        .admin-only, .client-only { display: none; }
        body.modo-admin .admin-only { display: block; }
        body.modo-cliente .client-only { display: flex; flex-direction: column; align-items: center; }

        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Admin Styles */
        .pix-config { background: #eff6ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #dbeafe; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { padding: 10px; border-radius: 8px; color: white; text-align: center; font-weight: bold; font-size: 13px; }
        
        .table-res { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f1f5f9; padding: 10px; text-align: left; font-size: 13px; }
        td { padding: 8px; border-bottom: 1px solid #eee; }

        /* Inputs e Botões */
        input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; justify-content: center; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-bottom: 15px; }
        .btn-zap { background: var(--whatsapp); color: white; text-decoration: none; }
        
        /* Portal Cliente */
        .client-box { width: 100%; max-width: 400px; text-align: center; }
        .preview-img { width: 100%; max-height: 250px; object-fit: contain; margin-top: 15px; border: 2px dashed #ccc; display: none; }
        .file-label { background: #475569; color: white; padding: 15px; border-radius: 8px; display: block; margin: 15px 0; cursor: pointer; }
    </style>
</head>
<body class="modo-admin"> <div class="container">
    
    <div class="admin-only">
        <h2>📊 Gestão de Cobrança</h2>
        
        <div class="pix-config">
            <strong>Minha Chave PIX:</strong>
            <input type="text" id="chavePix" value="seu-email@pix.com" onchange="salvarConfig()">
            <div id="qrcodeAdmin" style="margin-top:10px"></div>
        </div>

        <div class="stats">
            <div class="stat-card" style="background:var(--primary)">Total<br>R$ <span id="tGeral">0</span></div>
            <div class="stat-card" style="background:var(--success)">Pago<br>R$ <span id="tPago">0</span></div>
            <div class="stat-card" style="background:var(--danger)">Pendente<br>R$ <span id="tPend">0</span></div>
        </div>

        <button class="btn btn-add" onclick="adicionarPessoa()">+ Adicionar Nova Pessoa</button>

        <div class="table-res">
            <table>
                <thead>
                    <tr>
                        <th>Nome / WhatsApp</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <div class="client-only client-box">
        <h2 id="cNome">Olá!</h2>
        <div style="background:#f0fdf4; padding:20px; border-radius:10px; width:100%">
            <p>Valor a pagar:</p>
            <h1 style="color:var(--primary); margin:0">R$ <span id="cValor">0,00</span></h1>
            <div id="qrcodeCliente" style="display:flex; justify-content:center; margin:15px 0"></div>
        </div>

        <p style="margin-top:20px"><strong>Envie o comprovante:</strong></p>
        <label for="fotoInput" class="file-label">📸 Escolher da Galeria ou Câmera</label>
        <input type="file" id="fotoInput" accept="image/*" onchange="lerFoto(this)" style="display:none">
        
        <img id="imgPreview" class="preview-img">
        
        <button class="btn" style="background:var(--success); color:white; width:100%; padding:15px; margin-top:20px; font-size:16px" onclick="confirmarPagamento()">
            ENVIAR COMPROVANTE
        </button>
    </div>

</div>

<script>
    let db = JSON.parse(localStorage.getItem('cobranca_v5')) || {};
    let config = JSON.parse(localStorage.getItem('config_v5')) || { chave: "seu-email@pix.com" };
    let mesAtual = `${String(new Date().getMonth() + 1).padStart(2, '0')}/${new Date().getFullYear()}`;
    let idUsuarioAtivo = null;

    function init() {
        const params = new URLSearchParams(window.location.search);
        idUsuarioAtivo = params.get('p');

        if (idUsuarioAtivo) {
            document.body.className = "modo-cliente";
            exibirPainelCliente(idUsuarioAtivo);
        } else {
            document.body.className = "modo-admin";
            document.getElementById('chavePix').value = config.chave;
            atualizarTudo();
        }
    }

    // --- FUNÇÕES ADMIN ---
    function atualizarTudo() {
        const lista = db[mesAtual] || [];
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        
        let total = 0, pago = 0, pend = 0;

        lista.forEach(p => {
            total += p.valor;
            if(p.pago) pago += p.valor; else pend += p.valor;

            corpo.innerHTML += `
                <tr>
                    <td>
                        <input type="text" value="${p.nome}" onchange="editar(${p.id},'nome',this.value)" style="margin-bottom:4px"><br>
                        <input type="text" value="${p.tel}" onchange="editar(${p.id},'tel',this.value)" style="font-size:11px">
                    </td>
                    <td><input type="number" value="${p.valor}" onchange="editar(${p.id},'valor',this.value)"></td>
                    <td>
                        <button onclick="alternar(${p.id})" style="border:none; background:none; cursor:pointer">
                            ${p.pago ? '✅' : '⏳'}
                        </button>
                    </td>
                    <td>
                        <div style="display:flex; gap:5px">
                            <button class="btn btn-zap" onclick="cobrar(${p.id},'${p.nome}','${p.tel}',${p.valor})">📲</button>
                            ${p.comprovante ? `<button class="btn" onclick="verFoto('${p.comprovante}')">👁️</button>` : ''}
                            <button class="btn" onclick="excluir(${p.id})" style="background:#fee2e2">🗑️</button>
                        </div>
                    </td>
                </tr>
            `;
        });

        document.getElementById('tGeral').innerText = total.toFixed(2);
        document.getElementById('tPago').innerText = pago.toFixed(2);
        document.getElementById('tPend').innerText = pend.toFixed(2);
        
        const qrDiv = document.getElementById("qrcodeAdmin");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: config.chave, width: 80, height: 80 });
    }

    function adicionarPessoa() {
        const nova = { id: Date.now(), nome: "Novo Cliente", tel: "55", valor: 0, pago: false, comprovante: null };
        if(!db[mesAtual]) db[mesAtual] = [];
        db[mesAtual].push(nova);
        salvar();
        atualizarTudo();
    }

    function cobrar(id, nome, tel, valor) {
        const link = window.location.href.split('?')[0] + "?p=" + id;
        const msg = encodeURIComponent(`Olá ${nome}!\nSeguem os dados para pagamento:\n\nValor: R$ ${valor.toFixed(2)}\nPIX: ${config.chave}\n\nApós pagar, envie o comprovante por este link:\n${link}`);
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }

    function editar(id, campo, valor) {
        const p = db[mesAtual].find(x => x.id === id);
        if(p) p[campo] = campo === 'valor' ? parseFloat(valor) : valor;
        salvar();
        atualizarTudo();
    }

    function alternar(id) {
        const p = db[mesAtual].find(x => x.id === id);
        if(p) { p.pago = !p.pago; if(!p.pago) p.comprovante = null; }
        salvar();
        atualizarTudo();
    }

    function excluir(id) {
        if(confirm("Remover permanentemente?")) {
            db[mesAtual] = db[mesAtual].filter(x => x.id !== id);
            salvar();
            atualizarTudo();
        }
    }

    // --- FUNÇÕES CLIENTE ---
    function exibirPainelCliente(id) {
        const p = (db[mesAtual] || []).find(x => x.id == id);
        if (p) {
            document.getElementById('cNome').innerText = "Olá, " + p.nome;
            document.getElementById('cValor').innerText = p.valor.toFixed(2);
            new QRCode(document.getElementById("qrcodeCliente"), { text: config.chave, width: 150, height: 150 });
        } else {
            alert("Erro: Cobrança não encontrada.");
        }
    }

    function lerFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('imgPreview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function confirmarPagamento() {
        const imgBase64 = document.getElementById('imgPreview').src;
        if (!imgBase64 || imgBase64.includes('display:none')) return alert("Selecione a foto do comprovante primeiro!");

        const p = db[mesAtual].find(x => x.id == idUsuarioAtivo);
        if (p) {
            p.pago = true;
            p.comprovante = imgBase64;
            salvar();
            alert("Pronto! Seu comprovante foi enviado com sucesso.");
            window.location.search = ""; // Limpa para não ficar na tela do cliente
        }
    }

    // --- AUXILIARES ---
    function salvarConfig() {
        config.chave = document.getElementById('chavePix').value;
        localStorage.setItem('config_v5', JSON.stringify(config));
        atualizarTudo();
    }
    function salvar() { localStorage.setItem('cobranca_v5', JSON.stringify(db)); }
    function verFoto(img) { const w = window.open(""); w.document.write(`<img src="${img}" style="width:100%">`); }

    init();
</script>
</body>
</html>
